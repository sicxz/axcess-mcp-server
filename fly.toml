# fly.toml app configuration file generated for axcess-mcp-server on 2026-03-26T11:51:16-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'axcess-mcp-server'
primary_region = 'iad'

[build]

[env]
  PORT = '3000'
  TRANSPORT = 'http'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
